{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Acessar Minha Carteira</h2>

    <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" placeholder="Sua senha" required>
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div style="margin-top: 15px; text-align: center;">
        <p>Ainda não tem uma conta? <a href="/auth/register">Cadastre-se aqui</a>.</p>
    </div>
</div>
{% endblock %}
